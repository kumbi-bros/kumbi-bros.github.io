<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kumbi Bros</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/super-mario-256" rel="stylesheet">
    <style>
        /* Retro 8-bit Theme Styles */
        html, body {
            width: 100%;
            max-width: 100%;
            overflow-x: hidden;
            position: relative;
        }

        body {
            font-family: 'Press Start 2P', cursive;
            background-color: #5C94FC; /* Classic Mario Sky Blue */
            margin: 0;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Top HUD Styling */
        .hud-text {
            color: white;
            text-shadow: 2px 2px 0 #000;
        }

        /* 8-bit Border Utility */
        .pixel-border {
            border: 4px solid #000;
            box-shadow: 
                inset -4px -4px 0 rgba(0,0,0,0.3),
                inset 4px 4px 0 rgba(255,255,255,0.7),
                4px 4px 0 rgba(0,0,0,0.5);
        }

        /* Card Container & Animations */
        .card {
            background-color: #F8D8A0; /* Mushroom/Block color */
            transition: transform 0.1s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }

        .card:active {
            transform: scale(0.95);
            box-shadow: 
                inset -2px -2px 0 rgba(0,0,0,0.3),
                inset 2px 2px 0 rgba(255,255,255,0.7),
                2px 2px 0 rgba(0,0,0,0.5);
        }

        .image-frame {
            background-color: #FFF;
            border: 4px solid #000;
            box-shadow: inset -4px -4px 0 rgba(0,0,0,0.2);
            overflow: hidden;
            position: relative;
        }

        /* Pop-in Animation */
        @keyframes popIn {
            0% {
                transform: translateY(100px) scale(0.5);
                opacity: 0;
            }
            60% {
                transform: translateY(-20px) scale(1.05);
                opacity: 1;
            }
            80% {
                transform: translateY(10px) scale(0.95);
                opacity: 1;
            }
            100% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
        }

        .pop-in {
            opacity: 0;
            animation: popIn 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        /* Hover Jump Animation */
        @keyframes hoverJump {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .card:hover {
            animation: hoverJump 0.4s ease;
        }

        /* Ground/Brick styling */
        .ground-pattern {
            background-color: #c84c0c;
            background-image: 
                linear-gradient(45deg, #000 25%, transparent 25%, transparent 75%, #000 75%, #000), 
                linear-gradient(45deg, #000 25%, transparent 25%, transparent 75%, #000 75%, #000);
            background-size: 32px 32px;
            background-position: 0 0, 16px 16px;
            height: 64px;
            width: 100%;
            border-top: 4px solid #000;
            margin-top: auto;
        }

        /* Clouds */
        .cloud {
            position: absolute;
            opacity: 0.95;
            animation: floatClouds linear infinite;
        }
        
        .cloud svg {
            display: block;
            width: 100%;
            height: 100%;
        }

        @keyframes floatClouds {
            from { transform: translateX(-200px); }
            to { transform: translateX(100vw); }
        }

        /* Modern Mario Logo Font */
        .mario-logo {
            font-family: 'Super Mario 256', sans-serif;
            -webkit-text-stroke: 4px #000; /* Deep black border around letters */
            color: white; 
            /* Continuous 3D solid block shadow matching the reference */
            text-shadow: 
                1px 1px 0 #000, 2px 2px 0 #000, 3px 3px 0 #000, 4px 4px 0 #000,
                5px 5px 0 #000, 6px 6px 0 #000, 7px 7px 0 #000, 8px 8px 0 #000,
                9px 9px 0 #000, 10px 10px 0 #000, 11px 11px 0 #000, 12px 12px 0 #000,
                13px 13px 0 #000, 14px 14px 0 #000, 15px 15px 0 #000, 16px 16px 0 #000,
                17px 17px 0 #000, 18px 18px 0 #000, 19px 19px 0 #000, 20px 20px 0 #000,
                21px 21px 0 #000, 22px 22px 0 #000, 23px 23px 0 #000, 24px 24px 0 #000;
            line-height: 0.72 !important; /* Tightly stacks the rows safely */
            transform: rotate(-3deg); /* Matching the slight tilt from the image */
            display: inline-block;
            letter-spacing: -0.08em; /* TIGHTENS THE GAPS BETWEEN LETTERS */
            padding-bottom: 24px; /* Prevents the 3D shadow from clipping */
        }

        /* Adjust stroke & shadow for smaller screens */
        @media (max-width: 640px) {
            .mario-logo {
                -webkit-text-stroke: 2px #000;
                letter-spacing: -0.06em;
                line-height: 0.75 !important; /* Adjusted slightly for mobile overlap */
                padding-bottom: 12px;
                text-shadow: 
                    1px 1px 0 #000, 2px 2px 0 #000, 3px 3px 0 #000, 4px 4px 0 #000,
                    5px 5px 0 #000, 6px 6px 0 #000, 7px 7px 0 #000, 8px 8px 0 #000,
                    9px 9px 0 #000, 10px 10px 0 #000, 11px 11px 0 #000, 12px 12px 0 #000;
            }
        }

        /* Title shadow (Legacy) */
        .title-shadow {
            text-shadow: 4px 4px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 0px 4px 0 #000;
        }
    </style>
</head>
<body>

    <!-- Background Clouds -->
    <div class="fixed top-0 left-0 w-full h-full pointer-events-none z-0 overflow-hidden">
        <!-- Small Cloud -->
        <div class="cloud" style="top: 15%; left: -10%; animation-duration: 35s; width: 64px; height: 32px;">
            <svg viewBox="0 0 32 16" xmlns="http://www.w3.org/2000/svg" style="image-rendering: pixelated;">
                <path d="M12 0h8v2h4v2h4v2h2v8h-2v2h-24v-2h-2v-8h2v-2h4v-2h4v-2z" fill="#000"/>
                <path d="M12 2h8v2h4v2h4v8h-24v-8h4v-2h4v-2z" fill="#FFF"/>
                <path d="M6 12h20v2h-20z M24 10h2v2h-2z M6 10h2v2h-2z M16 10h4v2h-4z" fill="#D8D8D8"/>
            </svg>
        </div>
        <!-- Large Cloud -->
        <div class="cloud" style="top: 35%; left: -30%; animation-duration: 55s; width: 128px; height: 64px;">
            <svg viewBox="0 0 32 16" xmlns="http://www.w3.org/2000/svg" style="image-rendering: pixelated;">
                <path d="M12 0h8v2h4v2h4v2h2v8h-2v2h-24v-2h-2v-8h2v-2h4v-2h4v-2z" fill="#000"/>
                <path d="M12 2h8v2h4v2h4v8h-24v-8h4v-2h4v-2z" fill="#FFF"/>
                <path d="M6 12h20v2h-20z M24 10h2v2h-2z M6 10h2v2h-2z M16 10h4v2h-4z" fill="#D8D8D8"/>
            </svg>
        </div>
        <!-- Medium Cloud -->
        <div class="cloud" style="top: 20%; left: -60%; animation-duration: 45s; width: 96px; height: 48px;">
            <svg viewBox="0 0 32 16" xmlns="http://www.w3.org/2000/svg" style="image-rendering: pixelated;">
                <path d="M12 0h8v2h4v2h4v2h2v8h-2v2h-24v-2h-2v-8h2v-2h4v-2h4v-2z" fill="#000"/>
                <path d="M12 2h8v2h4v2h4v8h-24v-8h4v-2h4v-2z" fill="#FFF"/>
                <path d="M6 12h20v2h-20z M24 10h2v2h-2z M6 10h2v2h-2z M16 10h4v2h-4z" fill="#D8D8D8"/>
            </svg>
        </div>
    </div>

    <!-- HUD Overlay -->
    <header class="w-full flex justify-between p-3 sm:p-6 sm:px-12 z-10 text-[9px] sm:text-sm lg:text-base hud-text leading-loose">
        <div class="text-center">
            <p>TEAM</p>
            <p>000000</p>
        </div>
        <!-- Removed "hidden sm:block" so it stays visible on phones! -->
        <div class="text-center">
            <p>COINS</p>
            <p class="text-[#fc9838]">x99</p>
        </div>
        <div class="text-center">
            <p>WORLD</p>
            <p>1-1</p>
        </div>
        <div class="text-center">
            <p>TIME</p>
            <p>400</p>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow z-10 flex flex-col items-center pt-4 sm:pt-8 pb-16 px-4 w-full">
        
        <!-- KUMBI BROS Logo -->
        <div class="text-center mb-8 sm:mb-12 mt-2 w-full">
            <h1 class="text-[15vw] sm:text-7xl md:text-8xl lg:text-9xl mb-2 sm:mb-4 mario-logo">
                <span style="color: #049CD8;">K</span><span style="color: #FBD000;">U</span><span style="color: #E52521;">M</span><span style="color: #43B047;">B</span><span style="color: #FBD000;">I</span>
                <br />
                <span style="color: #E52521;">B</span><span style="color: #FBD000;">R</span><span style="color: #E52521;">O</span><span style="color: #43B047;">S</span>
            </h1>
            <p class="text-white text-[10px] sm:text-sm animate-pulse hud-text mt-4 sm:mt-6" style="font-family: 'Press Start 2P', cursive;">CHOOSE YOUR CHARACTER!</p>
        </div>

        <!-- Cards Container (Populated by JS) -->
        <div id="roster-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 sm:gap-8 max-w-7xl w-full">
            <!-- Cards will be injected here -->
        </div>

    </main>

    <!-- Background Scenery (Hills & Bushes) -->
    <div class="w-full relative pointer-events-none z-0" style="height: 0;">
        <!-- OVERFLOW CLIPPER: Prevents the 1400px landscape from forcing horizontal scrolling on phones -->
        <div class="absolute bottom-0 left-0 w-full overflow-hidden h-[150px]">
            <!-- Scenery Container: Replicates the exact spacing of World 1-1 reference -->
            <div class="absolute bottom-0 left-0 w-[1400px] xl:w-full h-[150px]">
                
                <!-- 1. Large Mountain (Far Left) -->
                <div class="absolute bottom-0 left-[2%] w-[180px] h-[90px] sm:w-[216px] sm:h-[108px]">
                    <path d="M30 2h4v2h6v2h6v2h4v2h4v2h2v4h2v4h2v12h-56v-12h2v-4h2v-4h2v-2h4v-2h4v-2h6v-2h6v-2z" fill="#28B800"/>
                    <path d="M30 2h4v2h-4z M34 4h6v2h-6z M40 6h6v2h-6z M46 8h4v2h-4z M50 10h4v2h-4z M54 12h2v4h-2z M56 16h2v4h-2z M58 20h2v10h-2z M4 20h2v10h-4z M6 16h2v4h-2z M8 12h2v4h-2z M10 10h4v2h-4z M14 8h4v2h-4z M18 6h6v2h-6z M24 4h6v2h-6z" fill="#78F858"/>
                </svg>
            </div>

            <!-- 2. Triple Bush (Middle) -->
            <div class="absolute bottom-0 left-[45%] w-[180px] h-[45px] sm:w-[216px] sm:h-[54px]">
                <!-- Custom SVG exactly matching the classic 5-bump Triple Bush -->
                <svg viewBox="0 0 64 16" xmlns="http://www.w3.org/2000/svg" style="image-rendering: pixelated; width: 100%; height: 100%;">
                    <path d="M12 0 h8 v2 h8 v-2 h8 v2 h8 v-2 h8 v2 h4 v2 h4 v2 h2 v8 h-2 v2 h-56 v-2 h-2 v-8 h2 v-2 h4 v-2 h4 v-2 z" fill="#000"/>
                    <path d="M12 2 h8 v2 h8 v-2 h8 v2 h8 v-2 h8 v2 h4 v2 h4 v8 h-56 v-8 h4 v-2 h4 v-2 z" fill="#78F858"/>
                    <path d="M6 12 h52 v2 h-52 z M6 10 h2 v2 h-2 z M16 10 h4 v2 h-4 z M24 10 h2 v2 h-2 z M32 10 h4 v2 h-4 z M40 10 h2 v2 h-2 z M48 10 h4 v2 h-4 z M56 10 h2 v2 h-2 z" fill="#28B800"/>
                </svg>
            </div>

            <!-- 3. Small Mountain (Middle-Right) -->
            <div class="absolute bottom-0 left-[62%] w-[110px] h-[50px] sm:w-[135px] sm:h-[60px]">
                <svg viewBox="0 0 40 18" xmlns="http://www.w3.org/2000/svg" style="image-rendering: pixelated; width: 100%; height: 100%;">
                     <path d="M16 0h8v2h4v2h4v2h2v4h2v8H4v-8h2v-4h2v-2h4v-2h4V0z" fill="#000"/>
                     <path d="M18 2h4v2h4v2h4v2h2v8H8v-8h2v-2h4v-2h4V2z" fill="#28B800"/>
                     <path d="M18 2h4v2h-4z M22 4h4v2h-4z M26 6h4v2h-4z M30 8h2v2h-2z M32 10h2v6h-2z M6 10h2v6H6z M8 8h2v2H8z M10 6h4v2h-4z M14 4h4v2h-4z" fill="#78F858"/>
                </svg>
            </div>

            <!-- 4. Single Bush (Far Right) -->
            <div class="absolute bottom-0 left-[88%] w-[90px] h-[45px] sm:w-[108px] sm:h-[54px]">
                <svg viewBox="0 0 32 16" xmlns="http://www.w3.org/2000/svg" style="image-rendering: pixelated; width: 100%; height: 100%;">
                    <path d="M12 0h8v2h4v2h4v2h2v8h-2v2h-24v-2h-2v-8h2v-2h4v-2h4v-2z" fill="#000"/>
                    <path d="M12 2h8v2h4v2h4v8h-24v-8h4v-2h4v-2z" fill="#78F858"/>
                    <path d="M6 12h20v2h-20z M24 10h2v2h-2z M6 10h2v2h-2z M16 10h4v2h-4z" fill="#28B800"/>
                </svg>
            </div>
            
            </div>
        </div>
    </div>

    <!-- Ground -->
    <div class="ground-pattern z-10"></div>

    <script>
        /** * EDIT YOUR TEAM MEMBERS HERE 
         * Add your member details.
         */
        const teamMembers = [
            {
                name: "Esakki",
                role: "no.1_dubakoor",
                image: "static/images/esakki.jpg", 
                instagram: "https://www.instagram.com/no.1_dubakoor"
            },
            {
                name: "Prabhu",
                role: "powerfull_prabu",
                image: "static/images/prabhu.jpg", 
                instagram: "https://www.instagram.com/powerfull_prabu"
            },
            {
                name: "Deiva",
                role: "deiv_46",
                image: "static/images/deiva.jpg",
                instagram: "https://www.instagram.com/deiv_46" 
            },
            {
                name: "Riyaz",
                role: "riy__aaz",
                image: "static/images/riyaz.jpg",
                instagram: "https://www.instagram.com/riy__aaz" 
            },
            {
                name: "Sandy",
                role: "__santhoshsandy__",
                image: "static/images/sandy.jpg",
                instagram: "https://www.instagram.com/__santhoshsandy__" 
            },
            {
                name: "Sabari",
                role: "kavarimonn_25",
                image: "static/images/sabari.jpg",
                instagram: "https://www.instagram.com/kavarimonn_25" 
            },
            {
                name: "Siva",
                role: "_siva_74",
                image: "static/images/siva.jpg",
                instagram: "https://www.instagram.com/_siva_74" 
            },
            {
                name: "Vinod",
                role: "_kaipulla._",
                image: "static/images/vinod.jpg",
                instagram: "https://www.instagram.com/_kaipulla._" 
            },
            {
                name: "Balaji",
                role: "_android_g",
                image: "static/images/balaji.jpg",
                instagram: "https://www.instagram.com/_android_g" 
            }
        ];

        // Function to shuffle an array (Fisher-Yates algorithm)
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // Function to create the HTML for a single member card
        function createCardHTML(member, index) {
            // Create a staggered delay so they pop in one by one (150ms between each)
            const animationDelay = index * 0.15;
            
            // Generic placeholder using ui-avatars to match retro vibe
            const fallbackImage = `https://ui-avatars.com/api/?name=${member.name}&background=random&color=fff&font-size=0.33&size=200&bold=true`;
            
            // Check if user provided an image, otherwise use fallback
            const imageUrl = member.image && member.image.trim() !== "" ? member.image : fallbackImage;

            return `
                <div class="pop-in" style="animation-delay: ${animationDelay}s;">
                    <!-- NOTE: Changed from div to anchor tag (<a>) so the whole card is clickable -->
                    <a href="${member.instagram}" target="_blank" rel="noopener noreferrer" class="card pixel-border p-4 w-full h-full flex flex-col items-center block">
                        
                        <!-- Image Container -->
                        <div class="image-frame w-40 h-40 sm:w-48 sm:h-48 mb-4 relative">
                            
                            <!-- Instagram Icon Badge -->
                            <div class="absolute top-1 right-1 bg-white p-1 rounded z-10 shadow border-2 border-black" style="box-shadow: 2px 2px 0 rgba(0,0,0,0.5);">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-pink-500">
                                    <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                                    <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                                    <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
                                </svg>
                            </div>

                            <img 
                                src="${imageUrl}" 
                                alt="${member.name}" 
                                class="w-full h-full object-cover pixelated-rendering"
                                onerror="this.onerror=null; this.src='${fallbackImage}';"
                                style="image-rendering: pixelated;"
                            />
                        </div>
                        
                        <!-- Name & Role -->
                        <div class="text-center w-full">
                            <h2 class="text-black text-sm sm:text-base mb-2 uppercase leading-relaxed">${member.name}</h2>
                            <div class="bg-black text-white text-[8px] sm:text-[10px] p-2 pixel-border">
                                ${member.role}
                            </div>
                        </div>

                    </a>
                </div>
            `;
        }

        // Render the cards on page load
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('roster-container');
            
            // 1. Shuffle the array
            shuffleArray(teamMembers);
            
            // 2. Generate HTML
            let htmlContent = '';
            teamMembers.forEach((member, index) => {
                htmlContent += createCardHTML(member, index);
            });
            
            // 3. Inject into the DOM
            container.innerHTML = htmlContent;
        });
    </script>
</body>
</html>
