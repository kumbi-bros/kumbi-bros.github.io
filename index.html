<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kumbi Bros</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        /* Retro 8-bit Theme Styles */
        body {
            font-family: 'Press Start 2P', cursive;
            background-color: #5C94FC; /* Classic Mario Sky Blue */
            margin: 0;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Top HUD Styling */
        .hud-text {
            color: white;
            text-shadow: 2px 2px 0 #000;
        }

        /* 8-bit Border Utility */
        .pixel-border {
            border: 4px solid #000;
            box-shadow: 
                inset -4px -4px 0 rgba(0,0,0,0.3),
                inset 4px 4px 0 rgba(255,255,255,0.7),
                4px 4px 0 rgba(0,0,0,0.5);
        }

        /* Card Container & Animations */
        .card {
            background-color: #F8D8A0; /* Mushroom/Block color */
            transition: transform 0.1s ease;
            cursor: pointer;
            text-decoration: none; /* For when card is an <a> tag */
            display: flex;
        }

        .card:active {
            transform: scale(0.95);
            box-shadow: 
                inset -2px -2px 0 rgba(0,0,0,0.3),
                inset 2px 2px 0 rgba(255,255,255,0.7),
                2px 2px 0 rgba(0,0,0,0.5);
        }

        .image-frame {
            background-color: #FFF;
            border: 4px solid #000;
            box-shadow: inset -4px -4px 0 rgba(0,0,0,0.2);
            overflow: hidden;
            position: relative;
        }

        /* Pop-in Animation */
        @keyframes popIn {
            0% {
                transform: translateY(100px) scale(0.5);
                opacity: 0;
            }
            60% {
                transform: translateY(-20px) scale(1.05);
                opacity: 1;
            }
            80% {
                transform: translateY(10px) scale(0.95);
                opacity: 1;
            }
            100% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
        }

        .pop-in {
            opacity: 0;
            animation: popIn 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        /* Hover Jump Animation */
        @keyframes hoverJump {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .card:hover {
            animation: hoverJump 0.4s ease;
        }

        /* Ground/Brick styling */
        .ground-pattern {
            background-color: #c84c0c;
            background-image: 
                linear-gradient(45deg, #000 25%, transparent 25%, transparent 75%, #000 75%, #000), 
                linear-gradient(45deg, #000 25%, transparent 25%, transparent 75%, #000 75%, #000);
            background-size: 32px 32px;
            background-position: 0 0, 16px 16px;
            height: 64px;
            width: 100%;
            border-top: 4px solid #000;
            margin-top: auto;
        }

        /* Clouds */
        .cloud {
            position: absolute;
            opacity: 0.95;
            animation: floatClouds linear infinite;
        }
        
        .cloud svg {
            display: block;
            width: 100%;
            height: 100%;
        }

        @keyframes floatClouds {
            from { transform: translateX(-200px); }
            to { transform: translateX(100vw); }
        }
    </style>
</head>
<body>

    <!-- Background Clouds -->
    <div class="fixed top-0 left-0 w-full h-full pointer-events-none z-0 overflow-hidden">
        <!-- Small Cloud -->
        <div class="cloud" style="top: 15%; left: -10%; animation-duration: 35s; width: 64px; height: 32px;">
            <svg viewBox="0 0 32 16" xmlns="http://www.w3.org/2000/svg" style="image-rendering: pixelated;">
                <path d="M12 0h8v2h4v2h4v2h2v8h-2v2h-24v-2h-2v-8h2v-2h4v-2h4v-2z" fill="#000"/>
                <path d="M12 2h8v2h4v2h4v8h-24v-8h4v-2h4v-2z" fill="#FFF"/>
                <path d="M6 12h20v2h-20z M24 10h2v2h-2z M6 10h2v2h-2z M16 10h4v2h-4z" fill="#D8D8D8"/>
            </svg>
        </div>
        <!-- Large Cloud -->
        <div class="cloud" style="top: 35%; left: -30%; animation-duration: 55s; width: 128px; height: 64px;">
            <svg viewBox="0 0 32 16" xmlns="http://www.w3.org/2000/svg" style="image-rendering: pixelated;">
                <path d="M12 0h8v2h4v2h4v2h2v8h-2v2h-24v-2h-2v-8h2v-2h4v-2h4v-2z" fill="#000"/>
                <path d="M12 2h8v2h4v2h4v8h-24v-8h4v-2h4v-2z" fill="#FFF"/>
                <path d="M6 12h20v2h-20z M24 10h2v2h-2z M6 10h2v2h-2z M16 10h4v2h-4z" fill="#D8D8D8"/>
            </svg>
        </div>
        <!-- Medium Cloud -->
        <div class="cloud" style="top: 20%; left: -60%; animation-duration: 45s; width: 96px; height: 48px;">
            <svg viewBox="0 0 32 16" xmlns="http://www.w3.org/2000/svg" style="image-rendering: pixelated;">
                <path d="M12 0h8v2h4v2h4v2h2v8h-2v2h-24v-2h-2v-8h2v-2h4v-2h4v-2z" fill="#000"/>
                <path d="M12 2h8v2h4v2h4v8h-24v-8h4v-2h4v-2z" fill="#FFF"/>
                <path d="M6 12h20v2h-20z M24 10h2v2h-2z M6 10h2v2h-2z M16 10h4v2h-4z" fill="#D8D8D8"/>
            </svg>
        </div>
    </div>

    <!-- HUD Overlay -->
    <header class="w-full flex justify-between p-6 sm:px-12 z-10 text-[10px] sm:text-sm lg:text-base hud-text leading-loose relative">
        <div class="text-center">
            <p>TEAM</p>
            <p>000009</p>
        </div>
        <div class="text-center hidden sm:block">
            <p>COINS</p>
            <p class="text-[#fc9838]">x69</p>
        </div>
        <div class="text-center">
            <p>WORLD</p>
            <p>1-1</p>
        </div>
        <div class="text-center">
            <p>TIME</p>
            <p>400</p>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow z-10 flex flex-col items-center pt-8 pb-16 px-4 relative">
        
        <div class="text-center mb-12">
            <h1 class="text-white text-3xl sm:text-5xl mb-4" style="text-shadow: 4px 4px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000;">
                PLAYER SELECT
            </h1>
            <p class="text-white text-xs sm:text-sm animate-pulse hud-text">CHOOSE YOUR CHARACTER!</p>
        </div>

        <!-- Cards Container (Populated by JS) -->
        <div id="roster-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8 max-w-7xl w-full">
            <!-- Cards will be injected here -->
        </div>

    </main>

    <!-- Ground -->
    <div class="ground-pattern z-10 relative"></div>

    <script>
        /** 
         * EDIT YOUR TEAM MEMBERS HERE 
         * Replace the 'image' string with a URL to your team member's photo.
         * The 'instagram' property sets where the card links to.
         */
        const teamMembers = [
            {
                name: "Esakki",
                role: "no.1_dubakoor",
                image: "static/images/esakki.jpg", 
                instagram: "https://www.instagram.com/no.1_dubakoor"
            },
            {
                name: "Prabhu",
                role: "powerfull_prabu",
                image: "static/images/prabhu.jpg", 
                instagram: "https://www.instagram.com/powerfull_prabu"
            },
            {
                name: "Deiva",
                role: "deiv_46",
                image: "static/images/deiva.jpg",
                instagram: "https://www.instagram.com/deiv_46" 
            },
            {
                name: "Riyaz",
                role: "riy__aaz",
                image: "static/images/riyaz.jpg",
                instagram: "https://www.instagram.com/riy__aaz" 
            },
            {
                name: "Sandy",
                role: "__santhoshsandy__",
                image: "static/images/sandy.jpg",
                instagram: "https://www.instagram.com/__santhoshsandy__" 
            },
            {
                name: "Sabari",
                role: "kavarimonn_25",
                image: "static/images/sabari.jpg",
                instagram: "https://www.instagram.com/kavarimonn_25" 
            },
            {
                name: "Siva",
                role: "_siva_74",
                image: "static/images/siva.jpg",
                instagram: "https://www.instagram.com/_siva_74" 
            },
            {
                name: "Vinod",
                role: "_kaipulla._",
                image: "static/images/vinod.jpg",
                instagram: "https://www.instagram.com/_kaipulla._" 
            },
             {
                name: "Balaji",
                role: "_android_g",
                image: "static/images/balaji.jpg",
                instagram: "https://www.instagram.com/_android_g" 
            },
            
        ];

        // Function to create the HTML for a single member card
        function createCardHTML(member, index) {
            // Create a staggered delay so they pop in one by one (150ms between each)
            const animationDelay = index * 0.15;
            
            // Generic placeholder using ui-avatars to match retro vibe
            const fallbackImage = `https://ui-avatars.com/api/?name=${member.name}&background=random&color=fff&font-size=0.33&size=200&bold=true`;
            
            // Check if user provided an image, otherwise use fallback
            const imageUrl = member.image && member.image.trim() !== "" ? member.image : fallbackImage;
            
            // Default link if none provided
            const profileLink = member.instagram || "https://www.instagram.com/no.1_dubakoor";

            return `
                <div class="pop-in" style="animation-delay: ${animationDelay}s;">
                    <!-- Card is now an anchor tag to link to Instagram -->
                    <a href="${profileLink}" target="_blank" rel="noopener noreferrer" class="card pixel-border p-4 w-full h-full flex flex-col items-center">
                        
                        <!-- Image Container -->
                        <div class="image-frame w-40 h-40 sm:w-48 sm:h-48 mb-4 relative">
                            
                            <!-- Instagram Badge Icon -->
                            <div class="absolute top-2 right-2 bg-white pixel-border flex items-center justify-center w-8 h-8 z-10" title="View Instagram Profile">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5" style="color: #E1306C;">
                                    <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4s1.791-4 4-4 4 1.791 4 4-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/>
                                </svg>
                            </div>

                            <img 
                                src="${imageUrl}" 
                                alt="${member.name}" 
                                class="w-full h-full object-cover pixelated-rendering"
                                onerror="this.onerror=null; this.src='${fallbackImage}';"
                                style="image-rendering: pixelated;"
                            />
                        </div>
                        
                        <!-- Name & Role -->
                        <div class="text-center w-full mt-auto">
                            <h2 class="text-black text-sm sm:text-base mb-2 uppercase leading-relaxed">${member.name}</h2>
                            <div class="bg-black text-white text-[8px] sm:text-[10px] p-2 pixel-border">
                                ${member.role}
                            </div>
                        </div>

                    </a>
                </div>
            `;
        }

        // Render the cards on page load
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('roster-container');
            
            // Randomly shuffle the team members (Fisher-Yates algorithm)
            let shuffledMembers = [...teamMembers];
            for (let i = shuffledMembers.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffledMembers[i], shuffledMembers[j]] = [shuffledMembers[j], shuffledMembers[i]];
            }
            
            let htmlContent = '';
            shuffledMembers.forEach((member, index) => {
                htmlContent += createCardHTML(member, index);
            });
            
            container.innerHTML = htmlContent;
        });
    </script>
</body>
</html>
